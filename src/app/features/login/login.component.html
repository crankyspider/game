<div class="login-page">
  <div class="background-layer"></div>
  <div class="overlay"></div>

  <div class="login-container">
    <h2>Secure Login</h2>
    <p class="subtext">Enter your State ID, your access code, and your active attempt code.</p>

    <form (ngSubmit)="submit()">
      <input
        class="login-input"
        type="text"
        name="stateId"
        [(ngModel)]="stateId"
        (input)="sanitizeStateId()"
        placeholder="State ID"
        autocomplete="off"
      />

      <input
        class="login-input"
        type="password"
        name="codePart1"
        [(ngModel)]="codePart1"
        (input)="sanitizeCodePart('codePart1')"
        placeholder="Access Code"
        maxlength="4"
        autocomplete="off"
      />

      <input
        class="login-input"
        type="password"
        name="codePart2"
        [(ngModel)]="codePart2"
        (input)="sanitizeCodePart('codePart2')"
        placeholder="Active Attempt Code"
        maxlength="4"
        autocomplete="off"
      />

      <button class="login-button" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Checking...' : 'Login' }}
      </button>

      <div class="status-message">{{ statusMessage }}</div>
      <div class="error-message">{{ errorMessage }}</div>
    </form>
  </div>
</div>
