<div class="completed-page">
  <div class="overlay"></div>
  <div class="content">
    <div class="eyebrow">TRANSMISSION RECEIVED</div>

    <h1>STAGE COMPLETE</h1>

    <p class="message">
      You completed the latest available mission.
      Further access is currently restricted until the next stage is released.
    </p>

    <div class="status-box">
      <div class="status-label">STATUS</div>
      <div class="status-value">AWAITING NEXT DEPLOYMENT</div>
    </div>

    <button class="continue-btn" (click)="continue()">
      Continue
    </button>
  </div>
</div>
